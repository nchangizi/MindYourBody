<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Your Body: Topic Cards</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #e8ede8; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 24px 16px; 
        }

        h1 { 
            font-size: 1.2rem; 
            color: #4a6b5b; 
            letter-spacing: 0.05em; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            font-weight: 600; 
        }

        .nav { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            justify-content: center; 
            max-width: 900px; 
            margin-bottom: 28px; 
        }

        .nav-btn { 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 2px solid transparent; 
            background: white; 
            color: #4a6b5b; 
            font-size: 0.78rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
        }

        .nav-btn:hover { border-color: #8ab89a; }
        .nav-btn.active { background: #8ab89a; color: white; border-color: #8ab89a; }

        .card { 
            background: white; 
            border-radius: 20px; 
            max-width: 720px; 
            width: 100%; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); 
            overflow: hidden; 
        }

        .card-header { 
            padding: 28px 32px 20px; 
            border-bottom: 1px solid #e8ede8; 
        }

        .topic-label { 
            font-size: 0.7rem; 
            letter-spacing: 0.08em; 
            text-transform: uppercase; 
            color: #7a9a8a; 
            margin-bottom: 8px; 
        }

        .card-title { 
            font-size: 1.6rem; 
            font-weight: 700; 
            color: #4a6b5b; 
            margin-bottom: 8px; 
        }

        .card-subtitle { 
            font-size: 0.95rem; 
            color: #6b8a7a; 
            font-style: italic; 
        }

        .card-body { 
            padding: 32px; 
        }

        .section { 
            margin-bottom: 28px; 
        }

        .section:last-child { 
            margin-bottom: 0; 
        }

        .section-title { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 0.06em; 
            color: #8ab89a; 
            margin-bottom: 16px; 
            font-weight: 700; 
        }

        .section ul { 
            list-style: none; 
        }

        .section li { 
            margin-bottom: 12px; 
            padding-left: 20px; 
            position: relative; 
            line-height: 1.6; 
            color: #5a6b60; 
        }

        .section li:before { 
            content: "•"; 
            position: absolute; 
            left: 0; 
            color: #8ab89a; 
        }

        .reframe-item { 
            margin-bottom: 18px; 
            padding: 14px; 
            background: #f8faf9; 
            border-radius: 8px; 
            border-left: 3px solid #8ab89a; 
        }

        .old { 
            font-size: 0.9rem; 
            color: #7a9a8a; 
            margin-bottom: 6px; 
            font-style: italic; 
        }

        .new { 
            font-size: 0.95rem; 
            color: #4a6b5b; 
            font-weight: 600; 
        }

        .strategy-chip { 
            display: inline-block; 
            background: #e8ede8; 
            color: #4a6b5b; 
            padding: 8px 14px; 
            border-radius: 16px; 
            margin-right: 8px; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
        }

        .prompt { 
            background: #f8faf9; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 8px; 
            border-left: 3px solid #8ab89a; 
            line-height: 1.6; 
            color: #5a6b60; 
            font-size: 0.95rem; 
        }

        .card-footer { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            padding: 20px 32px; 
            border-top: 1px solid #e8ede8; 
        }

        .arrow-btn { 
            background: none; 
            border: none; 
            color: #8ab89a; 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
        }

        .arrow-btn:hover:not(:disabled) { color: #4a6b5b; }
        .arrow-btn:disabled { color: #d7dcd9; cursor: not-allowed; }

        .counter { 
            color: #7a9a8a; 
            font-size: 0.9rem; 
            font-weight: 600; 
        }

        @media (max-width: 768px) {
            .card-title { font-size: 1.3rem; }
            .card-body { padding: 20px; }
            .nav { max-width: 100%; }
        }
    </style>
</head>
<body>
    <h1>Mind Your Body</h1>
    <div class="nav" id="nav"></div>
    <div class="card" id="card"></div>

    <script>
        const topics = [
            {
                title: "Pain as Protection",
                subtitle: "Understanding why your nervous system creates physical pain",
                concepts: [
                    "When we can't feel 'unacceptable' emotions (shame, despair, rage, grief, terror), our nervous system diverts us to physical pain",
                    "Your brain weighs the least unpleasant option: it chooses pain over overwhelming emotion",
                    "Physical pain grabs attention and distracts from an overflowing emotional reservoir",
                    "Your protective brain creates pain to keep you in a 'safe' place (at rest, isolated)",
                    "Pain's number one objective is to protect you from emotional overwhelm"
                ],
                reframes: [
                    { old: "My pain is random or physical", new: "My pain is communicating something my emotions can't express" },
                    { old: "I need to fix my body", new: "I need to lower my emotional reservoir and regulate my nervous system" },
                    { old: "Pain is my enemy", new: "Pain is my nervous system's protective strategy trying to help me" }
                ],
                strategies: [
                    "Name the unacceptable emotions",
                    "Ask: What am I avoiding feeling?",
                    "Lower your emotional reservoir",
                    "Thank your symptoms for their wisdom"
                ],
                prompts: [
                    "What emotions am I most unwilling to feel right now?",
                    "What would happen if I let myself feel them?",
                    "How has pain 'protected' me from emotional experience?"
                ]
            },
            {
                title: "Perception Creates Reality",
                subtitle: "How your nervous system interprets threat",
                concepts: [
                    "Your nervous system perceives repressed emotions and trauma as predators—literal threats",
                    "Your perceptions are powerful: if you perceive yourself unsafe, your nervous system responds as if you're literally under threat",
                    "Perception is your body's reality—even if everything is objectively fine",
                    "When a nervous system stays in fight-or-flight, every perception of overload becomes a trigger",
                    "The perception of safety is all that's required to defuse fight-or-flight and allow regulation"
                ],
                reframes: [
                    { old: "I am unsafe because I have pain", new: "I perceive myself as unsafe, and this perception triggers pain" },
                    { old: "My body is broken", new: "My nervous system is confused about what's actually dangerous" },
                    { old: "I need to BE safe to feel safe", new: "I need to perceive safety—my nervous system responds to perception" }
                ],
                strategies: [
                    "Notice your threat perception",
                    "Reality-test your beliefs",
                    "Shift from 'I am in danger' to 'I perceive danger'",
                    "Send safety signals intentionally"
                ],
                prompts: [
                    "What perceived threats are my pain responding to?",
                    "What evidence contradicts this threat perception?",
                    "What would safety look like to your nervous system right now?"
                ]
            },
            {
                title: "Beliefs Shape Your Body",
                subtitle: "How what you believe directly impacts your physical experience",
                concepts: [
                    "Your beliefs directly affect your physical experience",
                    "What is happening in your head is strongly influencing your experience of pain",
                    "Resetting your mindset gives you power to override a confused nervous system",
                    "Change your perceptions about what is wrong and how to fix it",
                    "Consciousness is the antidote to repression"
                ],
                reframes: [
                    { old: "My pain is permanent and unchangeable", new: "My pain responds to what I believe about it" },
                    { old: "I am broken", new: "My nervous system needs recalibration" },
                    { old: "My thoughts don't affect my body", new: "My thoughts directly influence my nervous system's threat assessment" }
                ],
                strategies: [
                    "Identify limiting beliefs about your condition",
                    "Write new, more resourceful beliefs",
                    "Notice the thought before the pain",
                    "Bring consciousness to what you've been avoiding"
                ],
                prompts: [
                    "What do I deeply believe about my condition?",
                    "How might this belief be contributing to my pain?",
                    "What new belief would serve my healing?"
                ]
            },
            {
                title: "Listen to Your Pain",
                subtitle: "What your symptoms are trying to tell you",
                concepts: [
                    "Pain is the nervous system's way of saying: stay here, rest, don't engage",
                    "Physical pain points to an overflowing emotional experience that feels too big to metabolize",
                    "Ask: What is this pain trying to tell you? Where are you feeling conflicted?",
                    "The pain is not in your head, but the solution is not in your body"
                ],
                reframes: [
                    { old: "My pain is meaningless", new: "My pain has a logic—it's protecting me from something" },
                    { old: "I need to avoid activity", new: "Pain may be signaling emotional avoidance instead" },
                    { old: "My pain is my enemy", new: "My pain is information offering wisdom" }
                ],
                strategies: [
                    "Ask your pain: What are you protecting me from?",
                    "Listen with curiosity, not judgment",
                    "Journal about what emotions the pain might be hiding",
                    "Practice observing pain with love and patience"
                ],
                prompts: [
                    "If my pain could speak, what would it say I need?",
                    "What unresolved feelings might my body be protecting me from?",
                    "Where in my life am I feeling most conflicted?"
                ]
            },
            {
                title: "Befriend Your Fear & Emotions",
                subtitle: "Inviting all feelings to the table",
                concepts: [
                    "Your brain perceives emotional experience as dangerous",
                    "Fear is information, not actual danger",
                    "You can give fear a seat at the table without letting it run the show",
                    "All parts of you are welcome—grief, rage, shame, fear, despair",
                    "Having willingness to witness your emotions with equanimity rewires your nervous system"
                ],
                reframes: [
                    { old: "Fear is dangerous and must be eliminated", new: "Fear is information telling me I'm protecting something" },
                    { old: "Emotions are destructive", new: "Emotions are information that moves through me when I let them" },
                    { old: "Some feelings are unacceptable", new: "All feelings are welcome and can be witnessed with compassion" }
                ],
                strategies: [
                    "Name the fear or emotion specifically",
                    "Journal about what it's protecting",
                    "Practice self-compassion",
                    "Give your emotions a seat at the kindergarten carpet"
                ],
                prompts: [
                    "What is scaring me most right now?",
                    "What emotion am I most unwilling to feel?",
                    "How can I give my fear a place at my table?"
                ]
            },
            {
                title: "The Sacred Practice: Breathe, Stay, Feel, Surrender",
                subtitle: "The core container for nervous system healing",
                concepts: [
                    "Breathe: Activate your parasympathetic nervous system",
                    "Stay: Remain present with what's arising, don't leave the moment",
                    "Feel: Allow the emotion to move through you without resistance",
                    "Surrender: Release the need to change, fix, or control anything",
                    "Teach your brain that staying with feelings is safer than being sick and in pain"
                ],
                reframes: [
                    { old: "If I feel my emotions, they'll overwhelm me", new: "Staying with emotions long enough allows them to move and integrate" },
                    { old: "I have to do something about this", new: "Surrendering what I can't control is the most powerful action" },
                    { old: "Discomfort means something is wrong", new: "Staying with discomfort long enough reveals what needs healing" }
                ],
                strategies: [
                    "Practice slow, conscious breathing",
                    "Set a timer and stay with one feeling for 2 minutes",
                    "Name the emotion: I feel _____",
                    "Say: I surrender my need to change this"
                ],
                prompts: [
                    "Can I breathe while feeling this right now?",
                    "What happens if I stay here for just one more breath?",
                    "What would surrendering feel like in my body?"
                ]
            },
            {
                title: "Release Control & Observe",
                subtitle: "Letting go as a path to healing",
                concepts: [
                    "Release the need to control your pain",
                    "Observe pain with love and patience instead",
                    "Control is a nervous system strategy; observation is a healing one",
                    "What is this pain trying to tell you when you listen instead of fight?"
                ],
                reframes: [
                    { old: "I must control my pain to be okay", new: "Observing my pain with curiosity is more healing than controlling it" },
                    { old: "If I'm not managing my pain, I'm failing", new: "Gentle observation allows my nervous system to relax" },
                    { old: "I need to fix this right now", new: "I can witness what's happening and stay present" }
                ],
                strategies: [
                    "Practice noticing without judging",
                    "Breathe while observing pain",
                    "Journal observations without trying to 'solve' the pain",
                    "Practice: 'I notice this; it's okay; I can stay'"
                ],
                prompts: [
                    "What happens when I stop trying to control the pain?",
                    "What does the pain reveal when I listen to it instead of fight it?",
                    "What would observing feel like in my body right now?"
                ]
            },
            {
                title: "Resistance & Habits",
                subtitle: "Why you keep returning to what's familiar",
                concepts: [
                    "Habits and resistance are security blankets",
                    "The brain seeks familiarity; if an activity feels 'safe,' the brain repeats it",
                    "Your habits may have protected you but are now barriers to healing",
                    "Beneath most resistance is fear",
                    "When you challenge your brain's patterns, it will challenge you back—and that's normal"
                ],
                reframes: [
                    { old: "My habits are bad and I should stop them", new: "My habits were adaptive; they protected me. Now I'm ready for something different" },
                    { old: "If I'm resisting, I'm not committed to healing", new: "Resistance is my nervous system trying to keep me safe. I can meet it with compassion and firm resolve" },
                    { old: "I'm lazy/unmotivated/broken", new: "I'm scared. My nervous system perceives risk in this change" }
                ],
                strategies: [
                    "Identify your protective habits",
                    "Ask: What is this habit protecting me from?",
                    "Recognize resistance and speak back in a more awake voice",
                    "Meet resistance with self-compassion + firm resolve"
                ],
                prompts: [
                    "What habit am I most reluctant to change?",
                    "What is this habit protecting me from?",
                    "What fear lies beneath my resistance?"
                ]
            },
            {
                title: "Acceptance & Release",
                subtitle: "Finding safety in 'what is'",
                concepts: [
                    "Acceptance is embracing that you'll never live in a place that is 'all better'",
                    "You don't have to like what's happening; you just need to accept it",
                    "Acceptance should feel like a long exhale—a release of grip on outcomes",
                    "Acceptance sends an immediate message of safety to your nervous system",
                    "Self-compassion lives in acceptance, where you don't need anything to be different"
                ],
                reframes: [
                    { old: "If I accept my condition, I'm giving up", new: "Acceptance is the most powerful position from which to heal" },
                    { old: "Acceptance means I'm okay with suffering", new: "Acceptance means I stop fighting reality, which creates space for change" },
                    { old: "I need to like my situation to accept it", new: "Acceptance is just: this is what's happening, and I can be here with it" }
                ],
                strategies: [
                    "Practice saying: 'This is what's here right now'",
                    "Notice when you're gripping outcomes",
                    "Practice releasing—literally relax your body",
                    "Find self-compassion in the acceptance"
                ],
                prompts: [
                    "What aspect of my condition have I refused to accept?",
                    "What would accepting this actually feel like?",
                    "How might acceptance free me from some of this struggle?"
                ]
            },
            {
                title: "The Timeline Trap & Urgency",
                subtitle: "Why rushing to heal keeps you stuck",
                concepts: [
                    "Putting a timeline on healing is a form of resistance",
                    "Recovery is not a straight line",
                    "The only way out is through—at the pace your nervous system needs",
                    "Urgency to heal is one of the biggest barriers to recovery",
                    "Urgency communicates fear; acceptance communicates safety"
                ],
                reframes: [
                    { old: "I should be healed by now", new: "Healing is happening at exactly the pace my nervous system needs" },
                    { old: "I need to get better to be acceptable", new: "I am acceptable right now, exactly as I am" },
                    { old: "Urgency will help me heal faster", new: "Urgency creates anxiety; acceptance creates the space for change" }
                ],
                strategies: [
                    "Notice when urgency arises",
                    "Practice saying: 'This will take as long as it takes'",
                    "Release the grip on timelines",
                    "Practice acceptance as a daily practice"
                ],
                prompts: [
                    "What am I desperate to change, and why?",
                    "What would it feel like to release my timeline?",
                    "How does urgency manifest in my body right now?"
                ]
            },
            {
                title: "Patterns, Triggers & Your Inner Child",
                subtitle: "Understanding what gets activated",
                concepts: [
                    "A trigger is a slingshot from the present into an unresolved past experience",
                    "When feeling unmoored, overwhelmed, anxious, discouraged—your inner child is present",
                    "The inner child needs to be known, acknowledged, and heard",
                    "You will encounter situations again and again in slightly different forms before recognizing patterns",
                    "This repetition is how learning and healing happen"
                ],
                reframes: [
                    { old: "This trigger shouldn't affect me", new: "I'm being triggered because something unresolved needs attention" },
                    { old: "I'm overreacting", new: "My inner child is responding from an old wound. I can comfort this part" },
                    { old: "I should be past this by now", new: "Healing patterns takes meeting them again and again. This is normal" }
                ],
                strategies: [
                    "Notice when you're triggered",
                    "Ask: What situation from my past does this remind me of?",
                    "Speak to your inner child with kindness",
                    "Journal from your child's perspective"
                ],
                prompts: [
                    "What triggered me today, and what old wound does it touch?",
                    "What is my inner child trying to tell me?",
                    "How can I acknowledge and comfort this part of myself?"
                ]
            },
            {
                title: "Meet Yourself Where You Are",
                subtitle: "Self-compassion as a daily practice",
                concepts: [
                    "Meet yourself exactly where you are on any given day",
                    "Not where you think you should be, but here, now, exactly as you are",
                    "You have done the best you could with what you've been given thus far",
                    "Wear life loosely and take each day as it comes",
                    "There is no cure for being human—only the choice to meet life with awareness"
                ],
                reframes: [
                    { old: "I should be further along by now", new: "I am exactly where I need to be for today" },
                    { old: "I failed because things didn't go as planned", new: "I showed up and did the best I could with what I had" },
                    { old: "If I'm not improving, I'm failing", new: "Some days are about endurance, not progress. Both are valid" }
                ],
                strategies: [
                    "Daily check-in: Where am I today?",
                    "Practice: I am doing the best I can",
                    "Allow variation without judgment",
                    "Celebrate showing up, period"
                ],
                prompts: [
                    "Where am I today, without judgment?",
                    "What do I need to meet myself here?",
                    "How can I practice self-compassion right now?"
                ]
            },
            {
                title: "The Work Worth Doing",
                subtitle: "Why this healing journey matters",
                concepts: [
                    "This work may be painful, but it's far less painful than despair, hopelessness, and endless chronic suffering",
                    "You're choosing between types of pain—and healing leads somewhere",
                    "Chronic pain without awareness leads nowhere",
                    "Thank your symptoms for the wisdom they have gifted you",
                    "Your willingness to do this work is proof you're not broken; you're human and willing"
                ],
                reframes: [
                    { old: "This is too hard; I should give up", new: "This difficulty is the pathway to freedom from a much deeper pain" },
                    { old: "Why should I do this work?", new: "Because the alternative—staying in chronic suffering—is so much harder" },
                    { old: "My pain is my enemy", new: "My pain has been protecting me; I can thank it for its service" }
                ],
                strategies: [
                    "Connect to your deepest why",
                    "Remember what living in pain costs you",
                    "Practice the work daily, imperfectly",
                    "Celebrate each moment of awareness"
                ],
                prompts: [
                    "What would my life look like if I healed?",
                    "What is worth the difficulty of this work?",
                    "What would I tell someone else struggling like I am?"
                ]
            }
        ];

        let current = 0;

        function render() {
            const t = topics[current];
            
            document.getElementById('nav').innerHTML = topics.map((tp, i) =>
                `<button class="nav-btn ${i===current?'active':''}" onclick="go(${i})">${tp.title}</button>`
            ).join('');

            document.getElementById('card').innerHTML = `
                <div class="card-header">
                    <div class="topic-label">Topic ${current+1} of ${topics.length}</div>
                    <div class="card-title">${t.title}</div>
                    <div class="card-subtitle">${t.subtitle}</div>
                </div>
                <div class="card-body">
                    <div class="section">
                        <div class="section-title">📚 Key Concepts</div>
                        <ul>${t.concepts.map(c=>`<li>${c}</li>`).join('')}</ul>
                    </div>
                    <div class="section">
                        <div class="section-title">🔄 Reframes & Helpful Phrases</div>
                        ${t.reframes.map(r=>`<div class="reframe-item"><div class="old">${r.old}</div><div class="new">→ ${r.new}</div></div>`).join('')}
                    </div>
                    <div class="section">
                        <div class="section-title">🛠 Practical Strategies</div>
                        ${t.strategies.map(s=>`<span class="strategy-chip">${s}</span>`).join('')}
                    </div>
                    <div class="section">
                        <div class="section-title">✏️ Reflection Prompts</div>
                        ${t.prompts.map(p=>`<div class="prompt">${p}</div>`).join('')}
                    </div>
                </div>
                <div class="card-footer">
                    <button class="arrow-btn" onclick="go(${current-1})" ${current===0?'disabled':''}>←</button>
                    <span class="counter">${current+1} / ${topics.length}</span>
                    <button class="arrow-btn" onclick="go(${current+1})" ${current===topics.length-1?'disabled':''}>→</button>
                </div>
            `;
        }

        function go(i) {
            if (i < 0 || i >= topics.length) return;
            current = i;
            render();
            window.scrollTo({top:0,behavior:'smooth'});
        }

        render();
    </script>
</body>
</html>
